<div class="app-shell">

  <aside class="sidebar">
    <div class="brand">
      <span class="logo">CS</span>
      <div>
        <h3>CyberStore</h3>
        <small>Panel {{ rol }}</small>
      </div>
    </div>

    <nav class="menu">

      <a
        *ngIf="esUser()"
        routerLink="/dashboard">
        Inicio
      </a>

      <a
        *ngIf="esAdmin()"
        routerLink="/admin/dashboard">
        Inicio
      </a>

      <a routerLink="/productos">
        Productos
      </a>

      <a
        *ngIf="esUser()"
        routerLink="/carrito">
        Carrito
      </a>

      <a
        *ngIf="esUser()"
        routerLink="/pedidos">
        Mis pedidos
      </a>

      <a
        *ngIf="esAdmin()"
        routerLink="/admin/productos">
        Gestión de productos
      </a>

      <a
        *ngIf="esAdmin()"
        routerLink="/admin/categorias">
        Categorías
      </a>

      <a
        *ngIf="esAdmin()"
        routerLink="/admin/usuarios">
        Usuarios
      </a>

      <a
        *ngIf="esAdmin()"
        routerLink="/admin/pedidos">
        Gestión de pedidos
      </a>

      <a
        *ngIf="esAdmin()"
        routerLink="/admin/dashboard">
        Panel Admin
      </a>

    </nav>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div>
        <h2>Bienvenido</h2>
        <p>
          {{ esAdmin() ? 'Gestiona tu tienda tecnológica' : 'Explora y compra productos tecnológicos' }}
        </p>
      </div>

      <div class="top-actions">
        <span class="role-badge">{{ rol }}</span>
        <button (click)="logout()">Cerrar sesión</button>
      </div>
    </header>

    <section class="content">
      <router-outlet></router-outlet>
    </section>
  </main>

</div>
